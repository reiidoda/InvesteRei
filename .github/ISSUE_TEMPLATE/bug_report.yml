name: Bug report
description: Report a reproducible defect in behavior
labels:
  - type:test
  - priority:P1
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact API/UI steps and sample payloads.
      placeholder: |
        1. Go to ...
        2. Call ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime versions, branch/commit, and service versions.
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Redact secrets before sharing.
