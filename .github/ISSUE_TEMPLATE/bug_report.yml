name: Bug report
description: Report a reproducible defect in behavior
labels:
  - type:test
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Primary ownership area.
      options:
        - area:backend
        - area:frontend
        - area:mobile
        - area:ai
        - area:docs
        - area:devops
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority:P1
        - priority:P2
        - priority:P3
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: Suggested owner
      description: Team or role that should own this issue.
      placeholder: backend-maintainer
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact API/UI steps and sample payloads.
      placeholder: |
        1. Go to ...
        2. Call ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime versions, branch/commit, and service versions.
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Redact secrets before sharing.
