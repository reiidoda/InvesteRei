name: Feature request
description: Propose a scoped enhancement
labels:
  - type:feature
  - priority:P2
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user/business problem is being solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe API/UI/data model changes.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Provide testable outcomes.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: Clarify what this issue will not include.
