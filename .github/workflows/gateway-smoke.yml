name: Gateway E2E Smoke

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  gateway-smoke:
    name: gateway-e2e-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gateway smoke flow
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/smoke/gateway_e2e_smoke.sh --start-stack --cleanup

      - name: Dump compose logs on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          docker compose logs --no-color --tail=300 || true
