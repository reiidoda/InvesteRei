server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

alphamath:
  jwt:
    secret: ${JWT_SECRET:dev_change_me}

services:
  auth: ${AUTH_URL:http://localhost:8081}
  portfolio: ${PORTFOLIO_URL:http://localhost:8082}
  ai: ${AI_URL:http://localhost:8090}
  simulation: ${SIMULATION_URL:http://localhost:8083}

spring:
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        - id: auth
          uri: ${services.auth}
          predicates:
            - Path=/api/v1/auth/**
        - id: portfolio
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/portfolio/**
        - id: risk
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/risk/**
        - id: math
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/math/**
        - id: registry
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/registry/**
        - id: trade
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/trade/**
        - id: funding
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/funding/**
        - id: compliance
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/compliance/**
        - id: execution
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/execution/**
        - id: audit
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/audit/**
        - id: notifications
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/notifications/**
        - id: market-data
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/market-data/**
        - id: statements
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/statements/**
        - id: research
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/research/**
        - id: reference
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/reference/**
        - id: watchlists
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/watchlists/**
        - id: alerts
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/alerts/**
        - id: brokers
          uri: ${services.portfolio}
          predicates:
            - Path=/api/v1/brokers/**
        - id: ai
          uri: ${services.ai}
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - RewritePath=/api/v1/ai/(?<segment>.*), /v1/$\{segment}
        - id: simulation
          uri: ${services.simulation}
          predicates:
            - Path=/api/v1/simulation/**
